name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Set up Go toolchain
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      # Install just command runner
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      # Full build pipeline (same steps you'd run locally)
      - name: Assemble dist/kit/
        run: just dist-kit

      - name: Build all targets
        run: just build-all

      - name: Package kit archives
        run: just package-kit

      - name: Package brew archives
        run: just package-brew

      - name: Generate release notes
        run: just release-notes "${{ github.ref_name }}"

      - name: Generate Homebrew formula
        run: just brew-formula "${{ github.ref_name }}"

      # Upload — these steps need tokens, so they stay CI-only
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Fab Kit ${{ github.ref_name }}" \
            --notes-file dist/release-notes.md \
            dist/kit-darwin-arm64.tar.gz \
            dist/kit-darwin-amd64.tar.gz \
            dist/kit-linux-arm64.tar.gz \
            dist/kit-linux-amd64.tar.gz \
            dist/brew-darwin-arm64.tar.gz \
            dist/brew-darwin-amd64.tar.gz \
            dist/brew-linux-arm64.tar.gz \
            dist/brew-linux-amd64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sahil87/homebrew-tap.git" /tmp/tap
          cp dist/fab-kit.rb /tmp/tap/Formula/fab-kit.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fab-kit.rb
          git commit -m "fab-kit ${version}"
          git push
