name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - uses: actions/checkout@v4

      # Set up Go toolchain
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Set up Rust toolchain with cross-compilation targets
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-unknown-linux-musl,x86_64-unknown-linux-musl

      # Cache cargo-zigbuild and Zig installations (versioned key)
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-zigbuild
            ~/.local/lib/python*/site-packages/ziglang
            ~/.local/bin/zig
          key: cross-tools-zig0.13-zigbuild0.19-${{ runner.os }}

      # Install Zig via pip and cargo-zigbuild with pinned versions (skipped on cache hit)
      - name: Install cross-compilation tools
        run: |
          which zig || pip install ziglang==0.13.0
          which cargo-zigbuild || cargo install cargo-zigbuild@0.19.8

      # Install just command runner
      - uses: extractions/setup-just@v2

      # Cross-compile Go and Rust binaries for all release targets
      - name: Build all targets
        run: just build-all

      # Create kit archives (generic + per-platform with dual binaries)
      - name: Package kit archives
        run: just package-kit

      # Create GitHub Release with all archives
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            kit.tar.gz \
            kit-darwin-arm64.tar.gz \
            kit-darwin-amd64.tar.gz \
            kit-linux-arm64.tar.gz \
            kit-linux-amd64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
