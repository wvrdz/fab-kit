name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up Go toolchain
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # Install just command runner
      - uses: extractions/setup-just@v2

      # Cross-compile Go binaries for all release targets
      - name: Build all targets
        run: just build-go-all

      # Create kit archives (generic + per-platform with Go binary)
      - name: Package kit archives
        run: just package-kit

      # Create GitHub Release with commit-level changelog
      - name: Create GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          COMMITS=$(git log --oneline "${PREV}..${TAG}" | sed 's/^/- /')
          printf 'Fab Kit release %s\n\n## Changes since %s\n\n%s\n' \
            "$VERSION" "$PREV" "$COMMITS" > /tmp/release-body.md

          gh release create "$TAG" \
            --title "Fab Kit ${TAG}" \
            --notes-file /tmp/release-body.md \
            kit.tar.gz \
            kit-darwin-arm64.tar.gz \
            kit-darwin-amd64.tar.gz \
            kit-linux-arm64.tar.gz \
            kit-linux-amd64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
