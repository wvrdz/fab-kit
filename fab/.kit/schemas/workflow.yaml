# fab/.kit/schemas/workflow.yaml
#
# Single source of truth for the Fab workflow: stages, states, and transitions.
# This schema is consumed by all scripts and skills to ensure consistent behavior.
#
# Version: 1.0.0
# ─────────────────────────────────────────────────────────────────────────────

# states — All valid progress values for a stage.
# Each stage in .status.yaml has a progress field that must be one of these values.
states:
  - id: pending
    symbol: "○"
    description: "Stage not yet started"
    terminal: false

  - id: active
    symbol: "●"
    description: "Currently working on this stage"
    terminal: false

  - id: done
    symbol: "✓"
    description: "Stage completed successfully"
    terminal: true

  - id: skipped
    symbol: "—"
    description: "Stage intentionally skipped (optional stages only)"
    terminal: true
    suffix: " (skipped)"

  - id: failed
    symbol: "✗"
    description: "Stage attempted but failed validation (review only)"
    terminal: false

# stages — The complete workflow pipeline.
# Stages execute in the order listed. Each stage defines:
#   - id: Unique identifier (matches progress key in .status.yaml)
#   - name: Human-readable display name
#   - generates: Artifact filename produced by this stage
#   - description: One-line explanation of stage purpose
#   - requires: List of prerequisite stage IDs that must be done/skipped first
#   - required: Whether this stage can be skipped (false = optional)
#   - initial_state: Default state when creating a new change
#   - allowed_states: Which state values are valid for this stage
#   - auto_checklist: Generate checklist.md when this stage completes
#   - commands: Primary commands that operate on this stage
stages:
  - id: intake
    name: "Intake"
    generates: intake.md
    description: "High-level intent, context, and impact analysis"
    requires: []
    required: true
    initial_state: active
    allowed_states: [active, done]
    commands: [fab-new, fab-continue, fab-clarify]

  - id: spec
    name: "Specification"
    generates: spec.md
    description: "Detailed requirements, scenarios, and acceptance criteria"
    requires: [intake]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done]
    commands: [fab-continue, fab-clarify]

  - id: tasks
    name: "Tasks"
    generates: tasks.md
    description: "Implementation task breakdown with dependencies"
    requires: [spec]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done]
    auto_checklist: true
    commands: [fab-continue, fab-ff, fab-clarify]

  - id: apply
    name: "Apply"
    generates: null
    description: "Execute implementation tasks in dependency order"
    requires: [tasks]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done]
    commands: [fab-continue]

  - id: review
    name: "Review"
    generates: null
    description: "Validate implementation against specs and checklists"
    requires: [apply]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done, failed]
    commands: [fab-continue]

  - id: hydrate
    name: "Hydrate"
    generates: null
    description: "Validate, hydrate learnings into memory"
    requires: [review]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done]
    commands: [fab-continue]

# transitions — Valid state transitions for each stage.
# Format: from_state -> to_state with conditions.
# All stages follow the same transition rules unless overridden.
transitions:
  default:
    - from: pending
      to: [active]
      condition: "Prerequisites met"

    - from: active
      to: [done, skipped]
      condition: "Stage completed or skipped"

    - from: done
      to: [active]
      condition: "Reset/rework requested (fab-continue with stage arg)"

  # Stage-specific overrides
  review:
    - from: pending
      to: [active]
      condition: "Prerequisites met"

    - from: active
      to: [done, failed]
      condition: "Validation passed or failed"

    - from: failed
      to: [active]
      condition: "Fixes applied, re-review requested"

    - from: done
      to: [active]
      condition: "Reset/rework requested"

# progression — Stage advancement rules.
# Defines how to determine current stage and next stage.
progression:
  # current_stage — How to identify which stage is currently active
  current_stage:
    rule: "First stage with state=active; if no active, first pending stage after last done; if all done, hydrate"
    fallback: hydrate

  # next_stage — How to determine which stage comes next
  next_stage:
    rule: "First stage in sequence where requires[] are all done/skipped and state=pending"

  # completion — When is the entire workflow complete?
  completion:
    rule: "hydrate stage has state=done"

# stage_numbers — Display numbering for status output.
# Maps stage ID to its position in the workflow (1-indexed).
stage_numbers:
  intake: 1
  spec: 2
  tasks: 3
  apply: 4
  review: 5
  hydrate: 6

# validation — Rules for .status.yaml validation.
validation:
  # Exactly one stage must be active (unless all are done)
  active_count:
    min: 0
    max: 1
    rule: "Exactly one stage should be active, or zero if workflow complete"

  # State must be from allowed_states for that stage
  state_validity:
    rule: "progress.{stage} must be in stages[].allowed_states"

  # Prerequisites must be satisfied before advancing
  prerequisites:
    rule: "Cannot set stage to active if requires[] stages are not done/skipped"

  # Terminal states cannot transition without explicit reset
  terminal_states:
    rule: "done/skipped stages can only transition back to active via explicit reset"

# metadata — Schema versioning and compatibility.
metadata:
  version: "1.0.0"
  compatible_with: "fab-kit >= 0.1.0"
  last_updated: "2026-02-12"
