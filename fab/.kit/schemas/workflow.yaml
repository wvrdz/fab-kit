# fab/.kit/schemas/workflow.yaml
#
# Single source of truth for the Fab workflow: stages, states, and transitions.
# This schema is consumed by all scripts and skills to ensure consistent behavior.
#
# Version: 1.0.0
# ─────────────────────────────────────────────────────────────────────────────

# states — All valid progress values for a stage.
# Each stage in .status.yaml has a progress field that must be one of these values.
states:
  - id: pending
    symbol: "○"
    description: "Stage not yet started"
    terminal: false

  - id: active
    symbol: "●"
    description: "Currently working on this stage"
    terminal: false

  - id: ready
    symbol: "◷"
    description: "Stage work product exists, eligible for advancement or clarification"
    terminal: false

  - id: done
    symbol: "✓"
    description: "Stage completed successfully"
    terminal: true

  - id: failed
    symbol: "✗"
    description: "Stage attempted but failed validation (review and review-pr)"
    terminal: false

  - id: skipped
    symbol: "⏭"
    description: "Stage intentionally bypassed"
    terminal: true

# stages — The complete workflow pipeline.
# Stages execute in the order listed. Each stage defines:
#   - id: Unique identifier (matches progress key in .status.yaml)
#   - name: Human-readable display name
#   - generates: Artifact filename produced by this stage
#   - description: One-line explanation of stage purpose
#   - requires: List of prerequisite stage IDs that must be done first
#   - required: Whether this stage is required (false = optional)
#   - initial_state: Default state when creating a new change
#   - allowed_states: Which state values are valid for this stage
#   - auto_checklist: Generate checklist.md when this stage completes
#   - commands: Primary commands that operate on this stage
stages:
  - id: intake
    name: "Intake"
    generates: intake.md
    description: "High-level intent, context, and impact analysis"
    requires: []
    required: true
    initial_state: active
    allowed_states: [active, ready, done]
    commands: [fab-new, fab-continue, fab-clarify]

  - id: spec
    name: "Specification"
    generates: spec.md
    description: "Detailed requirements, scenarios, and acceptance criteria"
    requires: [intake]
    required: true
    initial_state: pending
    allowed_states: [pending, active, ready, done, skipped]
    commands: [fab-continue, fab-clarify]

  - id: tasks
    name: "Tasks"
    generates: tasks.md
    description: "Implementation task breakdown with dependencies"
    requires: [spec]
    required: true
    initial_state: pending
    allowed_states: [pending, active, ready, done, skipped]
    auto_checklist: true
    commands: [fab-continue, fab-ff, fab-clarify]

  - id: apply
    name: "Apply"
    generates: null
    description: "Execute implementation tasks in dependency order"
    requires: [tasks]
    required: true
    initial_state: pending
    allowed_states: [pending, active, ready, done, skipped]
    commands: [fab-continue]

  - id: review
    name: "Review"
    generates: null
    description: "Validate implementation against specs and checklists"
    requires: [apply]
    required: true
    initial_state: pending
    allowed_states: [pending, active, ready, done, failed, skipped]
    commands: [fab-continue]

  - id: hydrate
    name: "Hydrate"
    generates: null
    description: "Validate, hydrate learnings into memory"
    requires: [review]
    required: true
    initial_state: pending
    allowed_states: [pending, active, ready, done, skipped]
    commands: [fab-continue]

  - id: ship
    name: "Ship"
    generates: null
    description: "Commit, push, and create PR"
    requires: [hydrate]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done, skipped]
    commands: [git-pr]

  - id: review-pr
    name: "PR Review"
    generates: null
    description: "Process PR review feedback"
    requires: [ship]
    required: true
    initial_state: pending
    allowed_states: [pending, active, done, failed, skipped]
    commands: [git-pr-review]

# transitions — Valid state transitions for each stage, keyed by event.
# Each entry: event name, valid from-states, resulting to-state.
# Stage-specific overrides (e.g., review) extend the default set.
# Side-effects: finish activates next pending stage; reset cascades downstream to pending.
transitions:
  default:
    - event: start
      from: [pending]
      to: active

    - event: advance
      from: [active]
      to: ready

    - event: finish
      from: [active, ready]
      to: done

    - event: reset
      from: [done, ready, skipped]
      to: active

    - event: skip
      from: [pending, active]
      to: skipped

  # Stage-specific overrides (review adds fail event and start-from-failed)
  review:
    - event: start
      from: [pending, failed]
      to: active

    - event: advance
      from: [active]
      to: ready

    - event: finish
      from: [active, ready]
      to: done

    - event: reset
      from: [done, ready, skipped]
      to: active

    - event: fail
      from: [active]
      to: failed

  # Stage-specific overrides (review-pr adds fail event and start-from-failed, same as review)
  review-pr:
    - event: start
      from: [pending, failed]
      to: active

    - event: advance
      from: [active]
      to: ready

    - event: finish
      from: [active, ready]
      to: done

    - event: reset
      from: [done, ready, skipped]
      to: active

    - event: fail
      from: [active]
      to: failed

# progression — Stage advancement rules.
# Defines how to determine current stage and next stage.
progression:
  # current_stage — How to identify which stage is currently active
  current_stage:
    rule: "First stage with state=active or state=ready; if no active/ready, first pending stage after last done or skipped; if all done/skipped, review-pr"
    fallback: review-pr

  # next_stage — How to determine which stage comes next
  next_stage:
    rule: "First stage in sequence where requires[] are all done or skipped and state=pending"

  # completion — When is the entire workflow complete?
  completion:
    rule: "review-pr stage has state=done or state=skipped"

# stage_numbers — Display numbering for status output.
# Maps stage ID to its position in the workflow (1-indexed).
stage_numbers:
  intake: 1
  spec: 2
  tasks: 3
  apply: 4
  review: 5
  hydrate: 6
  ship: 7
  review-pr: 8

# validation — Rules for .status.yaml validation.
validation:
  # Exactly one stage must be active (unless all are done)
  active_count:
    min: 0
    max: 1
    rule: "Exactly one stage should be active, or zero if workflow complete"

  # State must be from allowed_states for that stage
  state_validity:
    rule: "progress.{stage} must be in stages[].allowed_states"

  # Prerequisites must be satisfied before advancing
  prerequisites:
    rule: "Cannot set stage to active if requires[] stages are not done or skipped"

  # Terminal states cannot transition without explicit reset
  terminal_states:
    rule: "done stages can only transition back to active via explicit reset"

# issues — External tracker ID tracking (side-band, not a pipeline stage).
# Managed exclusively by `fab status add-issue` (append) and `fab status get-issues` (query).
# Not part of the stage/state progression — exists alongside the progress map.
issues:
  type: "string[]"
  description: "External tracker IDs associated with this change (e.g., DEV-123). Append-only."
  initial_value: "[]"
  managed_by: "fab status add-issue / get-issues"

# prs — PR URL tracking (side-band, not a pipeline stage).
# Managed exclusively by `fab status add-pr` (append) and `fab status get-prs` (query).
# Not part of the stage/state progression — exists alongside the progress map.
prs:
  type: "string[]"
  description: "PR URLs associated with this change. Append-only list of bare URL strings."
  initial_value: "[]"
  managed_by: "fab status add-pr / get-prs"

# metadata — Schema versioning and compatibility.
metadata:
  version: "1.0.0"
  compatible_with: "fab-kit >= 0.1.0"
  last_updated: "2026-03-04"
