# fab/.kit/model-tiers.yaml
#
# Maps provider-agnostic tier names to provider-specific model identifiers.
# Used by lib/sync-workspace.sh when deploying skills to agent directories.
#
# Tiers:
#   fast    — simple skills (script delegation, lookups, formatted output)
#   capable — complex skills (artifact generation, reasoning, code analysis)
#
# To override per-project, add a model_tiers: section to fab/config.yaml.

tiers:
  fast:
    claude: haiku
    # opencode: <TBD>
    # codex: <TBD>
  capable:
    claude: null    # null = use platform default (no model: override)
    # opencode: <TBD>
    # codex: <TBD>
