project:
  name: "{PROJECT_NAME}"
  description: "{PROJECT_DESCRIPTION}"

# Directories containing implementation code (relative to repo root).
source_paths:
  - {SOURCE_PATHS}

# The review stage validates code against a quality checklist.
# Built-in categories: functional_completeness, behavioral_correctness,
# scenario_coverage, edge_cases, security.
# Add your own — each becomes an extra section in the checklist.
# Example: [accessibility, performance, i18n]
checklist:
  extra_categories: []

# Extra instructions the agent follows when generating each stage's artifact.
# Add directives to shape how the agent writes specs, plans tasks, writes code, etc.
stage_directives:
  intake: []
  spec:
    - Use GIVEN/WHEN/THEN for scenarios
    - "Mark ambiguities with [NEEDS CLARIFICATION]"
  tasks: []
  apply: []
  review: []
  hydrate: []

agent:
  # Base command for spawning agent sessions in scripts and operators.
  # Shell expansions (e.g., $(basename "$(pwd)")) expand at invocation time.
  spawn_command: 'claude --dangerously-skip-permissions --effort max -n "$(basename "$(pwd)")"'
