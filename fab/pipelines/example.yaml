# Pipeline Manifest — Example
#
# This file is documentation-as-code. Copy and uncomment to create your own
# pipeline manifest. Run with: fab/.kit/scripts/pipeline/run.sh <manifest>
#
# ─── How it works ───────────────────────────────────────────────────────────
#
# By default, the orchestrator exits when all changes reach a terminal
# state (done/failed/invalid). For live-editing mode — where you add new
# entries while the orchestrator runs — set watch: true.
#
# The orchestrator only writes to the `stage` field. Your `id`,
# `depends_on`, and `watch` fields are never modified.
#
# ─── Watch mode ───────────────────────────────────────────────────────────
#
# watch: true    Infinite loop — polls for new entries, never exits
# watch: false   (default) Finite — exits when all changes are terminal
#
# Omit `watch` for one-shot runs. Add `watch: true` when you want the
# live-contract model: you stay ahead, the orchestrator catches up.
#
# ─── Prerequisites ──────────────────────────────────────────────────────────
#
# Each change listed here MUST already have:
#   1. A folder under fab/changes/<id>/
#   2. intake.md and spec.md generated (human has done the thinking)
#   3. A confidence score above the fab-ff gate threshold
#      (spec stage computes this via fab score)
#
# Changes that don't meet prerequisites are marked stage: invalid.
#
# ─── Dependency rules ───────────────────────────────────────────────────────
#
# - depends_on: []           Root node — branches from `base`
# - depends_on: [<id>]       Depends on one parent — branches from parent
# - depends_on: [<a>, <b>]   NOT SUPPORTED in v1 — multi-parent dependencies
#                             require merging parent branches manually first
#
# ─── Stage values ───────────────────────────────────────────────────────────
#
# The orchestrator writes these stage values as changes progress:
#
#   (absent)    Not started — eligible for dispatch when deps are done
#   intake      Currently at intake stage (intermediate)
#   spec        Currently at spec stage (intermediate)
#   tasks       Currently at tasks stage (intermediate)
#   apply       Currently at apply stage (intermediate)
#   review      Currently at review stage (intermediate)
#   hydrate     Currently at hydrate stage (intermediate)
#   done        Hydrate complete + PR created — terminal
#   failed      Pipeline failed for this change — terminal
#   invalid     Prerequisites not met — terminal
#
# Terminal stages are never re-dispatched. Intermediate stages are
# re-dispatched on orchestrator restart (idempotent resume).
#
# ─── Base branch ──────────────────────────────────────────────────────────
#
# base — Branch that root nodes (depends_on: []) branch from.
# Optional. Defaults to the current branch if omitted, with "main"
# as the last-resort fallback (e.g., detached HEAD).
#
# base: main
#
# ─── Example: Linear chain (A → B → C) ─────────────────────────────────────
#
# base: main
# watch: true        ← add this for live-editing mode
#
# changes:
#   - id: 260221-a7k2-user-model
#     depends_on: []
#     # stage: done          ← orchestrator writes this
#
#   - id: 260221-b3m1-auth-endpoints
#     depends_on: [260221-a7k2-user-model]
#     # stage: apply         ← orchestrator writes current stage
#
#   - id: 260221-c9p4-sessions
#     depends_on: [260221-b3m1-auth-endpoints]
#     # (no stage yet — not started)
#
# ─── Example: Fan-out (A → B, A → C) ───────────────────────────────────────
#
# base: main
#
# changes:
#   - id: 260221-a7k2-user-model
#     depends_on: []
#
#   - id: 260221-b3m1-auth-endpoints
#     depends_on: [260221-a7k2-user-model]
#
#   - id: 260221-c9p4-sessions
#     depends_on: [260221-a7k2-user-model]
#
# B and C both depend on A. The orchestrator dispatches them in list order
# (B first, then C) since v1 is serial.
#
# ─── Stacked PRs ───────────────────────────────────────────────────────────
#
# Root nodes create PRs targeting `base` (e.g., main).
# Dependent nodes create PRs targeting their parent's branch.
# This produces a stacked PR chain — merge in topological order.
#
# Merging to main is YOUR responsibility. The orchestrator creates PRs
# but never merges.
