project:
  name: "sddr"
  description: "Specification-Driven Development Resources — research, documentation, and tooling for SDD methodologies"

# Directories containing implementation code (relative to repo root).
source_paths:
  - fab/.kit/
  - src/

# Project-specific categories appended to default checklist categories.
# Defaults: functional_completeness, behavioral_correctness, scenario_coverage, edge_cases, security
checklist:
  extra_categories:
    - documentation_accuracy
    - cross_references

# Per-stage directives for artifact generation.
# Each stage key accepts a list of instructions the agent follows during generation.
stage_directives:
  intake: []
  spec:
    - Use GIVEN/WHEN/THEN for scenarios
    - Mark ambiguities with [NEEDS CLARIFICATION]
    - Document impacts on existing research docs
    - Note any methodology comparisons or synthesis
  tasks: []
  apply: []
  review: []
  hydrate: []

# Maps tier names to provider-specific model identifiers.
# Used by sync-workspace.sh when deploying skills to agent directories.
model_tiers:
  fast:
    claude: haiku
  capable:
    claude: null
