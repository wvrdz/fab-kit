agent:
    spawn_command: claude --dangerously-skip-permissions --effort max -n "$(basename "$(pwd)")"
checklist:
    extra_categories:
        - documentation_accuracy
        - cross_references
fab_version: 1.1.0
review_tools:
    copilot: true
    codex: true
    claude: true
project:
    description: FAB Kit — Tooling for Specification-Driven Development
    linear_workspace: null
    name: fab-kit
source_paths:
    - src/
stage_directives:
    apply: []
    hydrate: []
    intake: []
    review: []
    spec:
        - Use GIVEN/WHEN/THEN for scenarios
        - Mark ambiguities with [NEEDS CLARIFICATION]
        - Document impacts on existing research docs
        - Note any methodology comparisons or synthesis
    tasks: []
