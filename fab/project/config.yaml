checklist:
    extra_categories:
        - documentation_accuracy
        - cross_references
fab_version: 0.44.9
project:
    description: FAB Kit — Tooling for Specification-Driven Development
    linear_workspace: 
    name: fab-kit
source_paths:
    - fab/.kit/
    - src/
stage_directives:
    apply: []
    hydrate: []
    intake: []
    review: []
    spec:
        - Use GIVEN/WHEN/THEN for scenarios
        - Mark ambiguities with [NEEDS CLARIFICATION]
        - Document impacts on existing research docs
        - Note any methodology comparisons or synthesis
    tasks: []

agent:
  # Base command for spawning agent sessions in scripts and operators.
  # Shell expansions (e.g., $(basename "$(pwd)")) expand at invocation time.
  spawn_command: 'claude --dangerously-skip-permissions --effort max -n "$(basename "$(pwd)")"'
